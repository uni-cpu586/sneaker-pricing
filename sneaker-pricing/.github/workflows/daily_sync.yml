name: Daily Price Sync

on:
  schedule:
    - cron: "0 1 * * *"  # 每天台北時間 09:00（UTC+8 = UTC 01:00）
  workflow_dispatch:       # 手動觸發

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run price sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python main.py sync

      - name: Run trending sync (SNKRDUNK + Area02)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python daily_trending.py

      - name: Run hot chart sync (auto-update catalog)
        run: python scripts/daily_hot_sync.py

      - name: Commit catalog_auto.json if updated
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/catalog_auto.json
          git diff --cached --quiet || git commit -m "chore: auto-sync catalog from SNKRDUNK + Area02 [skip ci]"
          git push
