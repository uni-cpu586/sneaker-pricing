<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>C&C 球鞋比價助手</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0a; --card: #161616; --border: #252525;
  --accent: #F5C518; --green: #22c55e; --red: #ef4444;
  --text: #f0f0f0; --muted: #6b7280; --radius: 10px;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: var(--bg); color: var(--text);
  width: 320px; padding: 20px;
}
h1 { font-size: 16px; font-weight: 900; margin-bottom: 2px; }
h1 span { color: var(--accent); }
.sub { color: var(--muted); font-size: 12px; margin-bottom: 16px; }

.login-status {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 12px; border-radius: 8px;
  border: 1px solid var(--border); background: var(--card);
  font-size: 13px; margin-bottom: 16px;
}
.dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dot.green { background: var(--green); }
.dot.red { background: var(--red); }
.dot.grey { background: var(--muted); }

.section { margin-bottom: 12px; }
label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 5px; }
input {
  width: 100%; padding: 9px 11px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 7px; color: var(--text); font-size: 12px;
  outline: none; font-family: monospace;
}
input:focus { border-color: var(--accent); }

.btn {
  width: 100%; padding: 12px;
  border-radius: var(--radius); border: none;
  background: var(--accent); color: #000;
  font-size: 14px; font-weight: 800; cursor: pointer;
  margin-top: 4px;
}
.btn:disabled { opacity: 0.45; cursor: default; }

.result {
  margin-top: 10px; padding: 9px 12px;
  border-radius: 7px; font-size: 12px; display: none;
}
.result.ok  { background: rgba(34,197,94,.1); border: 1px solid rgba(34,197,94,.3); color: var(--green); }
.result.err { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3); color: var(--red); }
.result.show { display: block; }

.backend-status {
  font-size: 11px; padding: 6px 10px; border-radius: 6px;
  margin-bottom: 10px; border: 1px solid var(--border);
}
.backend-status.ok      { color: var(--green); border-color: rgba(34,197,94,.3); background: rgba(34,197,94,.07); }
.backend-status.warn    { color: var(--accent); border-color: rgba(245,197,24,.3); background: rgba(245,197,24,.07); }
.backend-status.err     { color: var(--red);   border-color: rgba(239,68,68,.3);  background: rgba(239,68,68,.07); }
.backend-status.checking{ color: var(--muted); }

#last-synced { font-size: 10px; color: var(--muted); text-align: center; margin-top: 6px; }

.status-row { display: flex; align-items: center; gap: 6px; margin-bottom: 10px; }
.status-row .backend-status { flex: 1; margin-bottom: 0; }
.refresh-btn {
  flex-shrink: 0; width: 28px; height: 28px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 6px; color: var(--muted); font-size: 14px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: color .15s;
}
.refresh-btn:hover { color: var(--accent); border-color: var(--accent); }
.refresh-btn:disabled { opacity: .4; cursor: default; }

details { margin-top: 12px; }
summary { font-size: 11px; color: var(--muted); cursor: pointer; user-select: none; }
.settings-body { margin-top: 10px; display: flex; flex-direction: column; gap: 10px; }
</style>
</head>
<body>

<h1>C&C <span>球鞋助手</span></h1>
<p class="sub">蝦皮 Cookie 一鍵同步</p>

<div class="login-status" id="login-status">
  <div class="dot grey" id="status-dot"></div>
  <span id="status-text">檢查登入狀態中…</span>
</div>

<div class="status-row">
  <div class="backend-status checking" id="backend-status">後端 Cookie 狀態：檢查中…</div>
  <button class="refresh-btn" id="refresh-btn" onclick="refreshStatus()" title="重新檢查">↻</button>
</div>

<button class="btn" id="sync-btn" onclick="syncCookie()" disabled>同步蝦皮 Cookie</button>

<div class="result" id="result"></div>
<div id="last-synced"></div>

<details id="settings-panel">
  <summary>⚙️ 設定後端 URL 與 Token</summary>
  <div class="settings-body">
    <div class="section">
      <label>後端 URL（預設已填入 Railway 網址）</label>
      <input type="text" id="backend-url" placeholder="https://sneaker-pricing-production.up.railway.app">
    </div>
    <div class="section">
      <label>Admin Token</label>
      <input type="password" id="admin-token" placeholder="貼上 ADMIN_TOKEN">
    </div>
    <button class="btn" style="background:var(--card);color:var(--muted);border:1px solid var(--border);font-size:13px;font-weight:600;" onclick="saveSettings()">儲存設定</button>
  </div>
</details>

<script src="popup.js"></script>
</body>
</html>
