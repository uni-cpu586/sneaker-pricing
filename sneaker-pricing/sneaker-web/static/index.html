<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>C&C 球鞋比價</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0a;
  --card: #161616;
  --border: #252525;
  --accent: #F5C518;
  --green: #22c55e;
  --orange: #f97316;
  --red: #ef4444;
  --text: #f0f0f0;
  --muted: #6b7280;
  --radius: 12px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  max-width: 480px;
  margin: 0 auto;
  padding-bottom: 40px;
}

/* Header */
.header {
  padding: 24px 16px 8px;
  text-align: center;
}
.header h1 {
  font-size: 24px;
  font-weight: 900;
  letter-spacing: -0.5px;
}
.header h1 span { color: var(--accent); }
.header p { color: var(--muted); font-size: 13px; margin-top: 4px; }

/* Tabs */
.tabs {
  position: sticky;
  top: 0;
  z-index: 10;
  background: var(--bg);
  display: flex;
  padding: 10px 16px 12px;
  gap: 8px;
  border-bottom: 1px solid var(--border);
}
.tab {
  flex: 1;
  padding: 10px 0;
  border: none;
  border-radius: 8px;
  background: var(--card);
  color: var(--muted);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}
.tab.active { background: var(--accent); color: #000; }

/* Panels */
.panel { display: none; padding: 16px; }
.panel.active { display: block; }

/* Search bar */
.search-box { display: flex; gap: 8px; margin-bottom: 14px; }
.search-box input {
  flex: 1;
  padding: 14px 16px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text);
  font-size: 15px;
  outline: none;
  -webkit-appearance: none;
}
.search-box input:focus { border-color: var(--accent); }
.search-box button {
  padding: 14px 20px;
  border-radius: var(--radius);
  border: none;
  background: var(--accent);
  color: #000;
  font-size: 16px;
  font-weight: 800;
  cursor: pointer;
}

/* Quick chips */
.chips-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
.chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
.chip {
  padding: 6px 13px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--muted);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
}
.chip.history { border-color: rgba(245,197,24,.3); color: var(--accent); background: rgba(245,197,24,.06); }
.chip:active { border-color: var(--accent); color: var(--accent); }

/* Loading */
.loading { text-align: center; padding: 48px 0; display: none; }
.loading.show { display: block; }
.spinner {
  width: 36px; height: 36px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 14px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading p { color: var(--muted); font-size: 13px; }

/* Result */
.result { display: none; }
.result.show { display: block; }

/* 查價結果：兩欄佈局 */
.result-layout {
  display: flex; gap: 14px; align-items: flex-start;
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px;
  margin-bottom: 16px;
}
.result-left { flex-shrink: 0; }
.result-img {
  width: 120px; height: 120px;
  border-radius: 10px; object-fit: contain;
  background: #fff; display: block;
}
.result-img-placeholder {
  width: 120px; height: 120px;
  border-radius: 10px; background: var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 36px;
}
.result-right { flex: 1; min-width: 0; }
.result-header { display: flex; align-items: flex-start; gap: 6px; flex-wrap: wrap; margin-bottom: 3px; }
.result-name { font-size: 14px; font-weight: 800; line-height: 1.3; flex: 1; min-width: 0; }
.badge {
  padding: 2px 8px; border-radius: 20px;
  font-size: 10px; font-weight: 700; letter-spacing: 0.3px;
  flex-shrink: 0; margin-top: 2px;
}
.badge-collab { background: rgba(249,115,22,.15); color: var(--orange); border: 1px solid rgba(249,115,22,.3); }
.result-sku { font-size: 11px; color: var(--muted); margin-bottom: 8px; }

/* Cached tag */
.cached-tag { font-size: 11px; color: var(--muted); text-align: right; margin-bottom: 8px; }

/* Arbitrage card */
.arb-card {
  background: linear-gradient(135deg, rgba(245,197,24,.08), rgba(245,197,24,.03));
  border: 1px solid rgba(245,197,24,.25);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 16px;
}
.arb-title { font-size: 12px; font-weight: 700; color: var(--accent); margin-bottom: 12px; letter-spacing: 0.5px; text-transform: uppercase; }
.arb-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.arb-label { color: var(--muted); font-size: 13px; }
.arb-val { font-weight: 700; font-size: 15px; }
.arb-divider { border: none; border-top: 1px solid rgba(245,197,24,.2); margin: 10px 0; }
.arb-profit-row { display: flex; justify-content: space-between; align-items: center; }
.arb-profit-num { font-size: 24px; font-weight: 900; color: var(--green); }
.arb-profit-pct {
  font-size: 13px; color: var(--green);
  background: rgba(34,197,94,.1);
  padding: 5px 12px; border-radius: 20px; font-weight: 700;
}

/* 平台行情（右欄緊湊列） */
.platforms-card { background: none; border: none; overflow: visible; margin-bottom: 0; }
.no-data-row { display: none; }
.platforms-card.show-all .no-data-row { display: flex; }
.toggle-row { padding: 5px 0 0; text-align: left; }
.toggle-btn {
  background: none; border: none;
  color: var(--muted); font-size: 11px; cursor: pointer;
  padding: 2px 0; border-radius: 4px;
}
.toggle-btn:hover { color: var(--text); }
.platform-row-r {
  display: flex; align-items: center;
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
  text-decoration: none; color: inherit;
  transition: background 0.1s;
}
.platform-row-r:last-child { border-bottom: none; }
.p-icon-r {
  width: 22px; height: 22px; border-radius: 5px;
  background: var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; margin-right: 7px; flex-shrink: 0;
}
.p-name-r {
  flex: 1; min-width: 0; font-size: 12px; font-weight: 600;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.p-price-r { font-size: 13px; font-weight: 800; text-align: right; flex-shrink: 0; }
.p-price-r.official { color: var(--green); }
.p-price-r.no-data { color: var(--accent); font-size: 11px; font-weight: 600; }
.p-price-r.no-url { color: var(--muted); font-size: 11px; font-weight: 400; }
.p-range-r { font-size: 10px; color: var(--muted); text-align: right; }
.official-dot { display: inline-block; width: 5px; height: 5px; background: var(--green); border-radius: 50%; margin-left: 4px; vertical-align: middle; }

/* Query time & share */
.result-actions {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 12px;
}
.query-time { font-size: 11px; color: var(--muted); }
.share-btn {
  background: none; border: 1px solid var(--border);
  color: var(--muted); font-size: 12px; cursor: pointer;
  padding: 5px 12px; border-radius: 20px;
  transition: all 0.15s;
}
.share-btn:active { border-color: var(--accent); color: var(--accent); }

/* Toast */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--card); border: 1px solid var(--border);
  color: var(--text); font-size: 13px; padding: 10px 20px;
  border-radius: 20px; opacity: 0; transition: all 0.25s;
  pointer-events: none; white-space: nowrap; z-index: 100;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Error */
.error-msg {
  background: rgba(239,68,68,.08);
  border: 1px solid rgba(239,68,68,.3);
  border-radius: var(--radius);
  padding: 14px 16px;
  color: var(--red);
  font-size: 14px;
  display: none;
  margin-bottom: 16px;
}
.error-msg.show { display: block; }
.profit-error {
  background: rgba(239,68,68,.08);
  border: 1px solid rgba(239,68,68,.3);
  border-radius: var(--radius);
  padding: 12px 16px;
  color: var(--red);
  font-size: 14px;
  display: none;
  margin-bottom: 12px;
}
.profit-error.show { display: block; }

/* ── 利潤試算 ── */
.form-group { margin-bottom: 18px; }
.form-label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 8px; font-weight: 500; }
.form-row { display: flex; gap: 8px; }
.form-input {
  flex: 1;
  padding: 14px 16px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text);
  font-size: 15px;
  outline: none;
  width: 100%;
  -webkit-appearance: none;
}
.form-input:focus { border-color: var(--accent); }
.form-select {
  padding: 14px 12px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text);
  font-size: 14px;
  outline: none;
}
.slider-row { display: flex; align-items: center; gap: 14px; }
.slider {
  flex: 1; -webkit-appearance: none;
  height: 4px; background: var(--border); border-radius: 2px; outline: none;
}
.slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 22px; height: 22px;
  border-radius: 50%; background: var(--accent); cursor: pointer;
}
.slider-val { font-size: 14px; font-weight: 800; color: var(--accent); min-width: 42px; text-align: right; }

.calc-btn {
  width: 100%;
  padding: 16px;
  border-radius: var(--radius);
  border: none;
  background: var(--accent);
  color: #000;
  font-size: 16px;
  font-weight: 800;
  cursor: pointer;
  margin-bottom: 16px;
}

.profit-result { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; display: none; }
.profit-result.show { display: block; }
.profit-main { padding: 28px 20px; text-align: center; border-bottom: 1px solid var(--border); }
.profit-main-label { color: var(--muted); font-size: 13px; margin-bottom: 6px; }
.profit-main-price { font-size: 40px; font-weight: 900; color: var(--accent); letter-spacing: -1px; }
.profit-main-sub { color: var(--muted); font-size: 13px; margin-top: 10px; }
.profit-breakdown { padding: 4px 0; }
.br-row { display: flex; justify-content: space-between; padding: 13px 20px; font-size: 14px; border-bottom: 1px solid var(--border); }
.br-row:last-child { border-bottom: none; }
.br-row .label { color: var(--muted); }
.br-row .value { font-weight: 700; }
.br-row.highlight .value { color: var(--green); font-size: 15px; }

/* ── 熱銷榜 ── */
.trending-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.trending-header h2 { font-size: 16px; font-weight: 800; }
.trending-meta { font-size: 12px; color: var(--muted); }

.trend-item {
  display: flex; align-items: center;
  padding: 14px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 8px;
  cursor: pointer;
  transition: border-color 0.15s;
}
.trend-item:active { border-color: var(--accent); }
.rank-badge {
  width: 34px; height: 34px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 900;
  margin-right: 12px; flex-shrink: 0;
}
.rank-1 { background: rgba(245,197,24,.2); color: var(--accent); }
.rank-2 { background: rgba(192,192,192,.15); color: #c0c0c0; }
.rank-3 { background: rgba(205,127,50,.15); color: #cd7f32; }
.rank-other { background: var(--border); color: var(--muted); }
.trend-info { flex: 1; min-width: 0; }
.trend-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.trend-source { font-size: 11px; color: var(--muted); margin-top: 3px; }
.trend-price { font-size: 15px; font-weight: 800; color: var(--accent); flex-shrink: 0; margin-left: 10px; }

.source-tag {
  display: inline-block; padding: 2px 7px;
  border-radius: 4px; font-size: 10px; font-weight: 700;
  margin-right: 4px;
}
.source-snkrdunk { background: rgba(245,197,24,.15); color: var(--accent); }
.source-area02 { background: rgba(249,115,22,.15); color: var(--orange); }

.empty-state { text-align: center; padding: 48px 20px; color: var(--muted); }
.empty-state .icon { font-size: 36px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; line-height: 1.6; }

/* Suggest dropdown */
.search-wrap { position: relative; margin-bottom: 14px; }
.search-wrap .search-box { margin-bottom: 0; }
.suggest-drop {
  position: absolute; top: 100%; left: 0; right: 0;
  background: var(--card); border: 1px solid rgba(245,197,24,.4);
  border-top: none; border-radius: 0 0 10px 10px;
  z-index: 50; overflow: hidden; display: none;
}
.suggest-drop.open { display: block; }
.suggest-item {
  padding: 11px 16px; cursor: pointer; transition: background 0.1s;
  display: flex; justify-content: space-between; align-items: center;
  border-bottom: 1px solid var(--border);
}
.suggest-item:last-child { border-bottom: none; }
.suggest-item:hover, .suggest-item.active { background: rgba(245,197,24,.08); }
.suggest-name { font-size: 14px; }
.suggest-hint { font-size: 11px; color: var(--muted); }
</style>
</head>
<body>

<div class="header">
  <h1>C&C <span>球鞋比價</span></h1>
  <p>各平台即時行情・套利分析・利潤試算</p>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('search',this)">🔍 查價</button>
  <button class="tab" onclick="switchTab('profit',this)">💰 利潤</button>
  <button class="tab" onclick="switchTab('trending',this)">🔥 熱銷</button>
</div>

<!-- ── 查價 ── -->
<div class="panel active" id="panel-search">
  <div class="search-wrap">
    <div class="search-box">
      <input type="text" id="search-input" placeholder="鞋款名稱、SKU、中文名…"
             autocomplete="off" autocorrect="off" spellcheck="false"
             oninput="onSearchInput()" onkeydown="onSearchKeydown(event)">
      <button onclick="doSearch()">查</button>
    </div>
    <div class="suggest-drop" id="suggest-drop"></div>
  </div>

  <div id="chips-area"></div>

  <div class="error-msg" id="search-error"></div>

  <div class="loading" id="search-loading">
    <div class="spinner"></div>
    <p>正在查詢各平台，約需 15–20 秒…</p>
  </div>

  <div class="result" id="search-result">
    <div class="result-actions">
      <div>
        <div class="cached-tag" id="cached-tag" style="display:none">⚡ 快取結果（10 分鐘內）</div>
        <div class="query-time" id="query-time"></div>
      </div>
      <button class="share-btn" onclick="shareResult()">🔗 分享</button>
    </div>

    <!-- 兩欄：左圖片，右名稱 + 平台行情 -->
    <div class="result-layout">
      <div class="result-left">
        <div id="result-img-wrap">
          <div class="result-img-placeholder">👟</div>
        </div>
      </div>
      <div class="result-right">
        <div class="result-header">
          <span class="result-name" id="result-name"></span>
          <span class="badge badge-collab" id="collab-badge" style="display:none">聯名款</span>
        </div>
        <div class="result-sku" id="result-sku"></div>
        <div class="platforms-card" id="platforms-card">
          <div id="platforms-list"></div>
          <div class="toggle-row" id="toggle-row" style="display:none">
            <button class="toggle-btn" id="toggle-btn" onclick="toggleNoData()">顯示查無資料 ▾</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 套利卡 -->
    <div class="arb-card" id="arb-card" style="display:none">
      <div class="arb-title">💡 套利空間</div>
      <div class="arb-row">
        <span class="arb-label">官網最低買入</span>
        <span class="arb-val" id="arb-buy"></span>
      </div>
      <div class="arb-row">
        <span class="arb-label">二手市場最高賣出</span>
        <span class="arb-val" id="arb-sell"></span>
      </div>
      <hr class="arb-divider">
      <div class="arb-profit-row">
        <div>
          <div style="font-size:12px;color:var(--muted);margin-bottom:4px">預估利潤</div>
          <div class="arb-profit-num" id="arb-profit"></div>
        </div>
        <span class="arb-profit-pct" id="arb-pct"></span>
      </div>
    </div>
  </div>
</div>

<!-- ── 利潤試算 ── -->
<div class="panel" id="panel-profit">
  <div class="form-group">
    <label class="form-label">進貨成本</label>
    <div class="form-row">
      <input type="number" class="form-input" id="p-cost" placeholder="例：3000" inputmode="decimal">
      <select class="form-select" id="p-currency">
        <option value="TWD">TWD</option>
        <option value="JPY">JPY ¥</option>
        <option value="USD">USD $</option>
      </select>
    </div>
  </div>

  <div class="form-group">
    <label class="form-label">運費（TWD）</label>
    <input type="number" class="form-input" id="p-shipping" value="100" placeholder="7-11/全家 約 NT$100" inputmode="decimal">
  </div>

  <div class="form-group">
    <label class="form-label">平台抽成</label>
    <div class="slider-row">
      <input type="range" class="slider" id="sl-commission" min="0" max="20" value="5" step="1"
             oninput="$('commission-val').textContent=this.value+'%'">
      <span class="slider-val" id="commission-val">5%</span>
    </div>
  </div>

  <div class="form-group">
    <label class="form-label">目標毛利率</label>
    <div class="slider-row">
      <input type="range" class="slider" id="sl-margin" min="5" max="60" value="15" step="1"
             oninput="$('margin-val').textContent=this.value+'%'">
      <span class="slider-val" id="margin-val">15%</span>
    </div>
  </div>

  <div class="profit-error" id="profit-error"></div>
  <button class="calc-btn" onclick="calcProfit()">計算建議售價</button>

  <div class="profit-result" id="profit-result">
    <div class="profit-main">
      <div class="profit-main-label">建議售價</div>
      <div class="profit-main-price" id="pr-price"></div>
      <div class="profit-main-sub" id="pr-sub"></div>
    </div>
    <div class="profit-breakdown">
      <div class="br-row">
        <span class="label">進貨成本（TWD）</span>
        <span class="value" id="br-cost"></span>
      </div>
      <div class="br-row">
        <span class="label">運費</span>
        <span class="value" id="br-shipping"></span>
      </div>
      <div class="br-row">
        <span class="label">總成本</span>
        <span class="value" id="br-total"></span>
      </div>
      <div class="br-row">
        <span class="label">平台抽成</span>
        <span class="value" id="br-commission"></span>
      </div>
      <div class="br-row highlight">
        <span class="label">你的毛利</span>
        <span class="value" id="br-margin"></span>
      </div>
    </div>
  </div>
</div>

<!-- ── 熱銷榜 ── -->
<div class="panel" id="panel-trending">
  <div class="trending-header">
    <h2>熱銷榜</h2>
    <span class="trending-meta" id="trending-meta">SNKRDUNK · Area02</span>
  </div>
  <div id="trending-list">
    <div class="empty-state">
      <div class="icon">🔥</div>
      <p>載入中…</p>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const $ = id => document.getElementById(id);
const fmt = n => n != null ? 'NT$' + Math.round(n).toLocaleString() : '—';

const ICONS = {
  'ABC-MART JP': '🇯🇵',
  'Nike TW':     '👟',
  'Adidas TW':   '🇹🇼',
  'Yahoo Auctions JP': '🏷️',
  'PChome 24h':  '🛒',
  'Momo 購物':   '🛍️',
  'Shopee TW':   '🧡',
  'StockX':      '📈',
};

const QUICK = ['熊貓 Dunk','Samba','AJ1 倒鉤','Air Force 1','Yeezy 斑馬','NB 550','Speedcat','Kayano 14','NB 9060','Campus 00s'];

// ── 搜尋建議 ──────────────────────────────────────────────
let _suggestTimer, _suggestIdx = -1;

function onSearchInput() {
  _suggestIdx = -1;
  clearTimeout(_suggestTimer);
  const q = $('search-input').value.trim();
  if (q.length < 2) { hideSuggest(); return; }
  _suggestTimer = setTimeout(() => fetchSuggest(q), 280);
}

async function fetchSuggest(q) {
  try {
    const r = await fetch('/api/suggest?q=' + encodeURIComponent(q));
    renderSuggest(await r.json());
  } catch { hideSuggest(); }
}

function renderSuggest(items) {
  const drop = $('suggest-drop');
  if (!items || !items.length) { hideSuggest(); return; }
  drop.innerHTML = items.map(it =>
    `<div class="suggest-item" data-name="${it.name.replace(/"/g,'&quot;')}"
         onclick="pickSuggest(this.dataset.name)">
      <span class="suggest-name">${it.name}</span>
      ${it.hint ? `<span class="suggest-hint">${it.hint}</span>` : ''}
    </div>`
  ).join('');
  drop.classList.add('open');
}

function hideSuggest() {
  const drop = $('suggest-drop');
  drop.classList.remove('open');
  drop.innerHTML = '';
  _suggestIdx = -1;
}

function pickSuggest(name) {
  $('search-input').value = name;
  hideSuggest();
  doSearch();
}

function onSearchKeydown(e) {
  const drop = $('suggest-drop');
  const items = drop.querySelectorAll('.suggest-item');
  if (drop.classList.contains('open') && items.length) {
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      _suggestIdx = Math.min(_suggestIdx + 1, items.length - 1);
      items.forEach((el, i) => el.classList.toggle('active', i === _suggestIdx));
      return;
    }
    if (e.key === 'ArrowUp') {
      e.preventDefault();
      _suggestIdx = Math.max(_suggestIdx - 1, -1);
      items.forEach((el, i) => el.classList.toggle('active', i === _suggestIdx));
      return;
    }
    if (e.key === 'Enter' && _suggestIdx >= 0) {
      e.preventDefault();
      pickSuggest(items[_suggestIdx].dataset.name);
      return;
    }
    if (e.key === 'Escape') { hideSuggest(); return; }
  }
  if (e.key === 'Enter') doSearch();
}

document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrap')) hideSuggest();
});

// ── 搜尋歷史 ─────────────────────────────────────────────
const HIST_KEY = 'sneaker_history';
function getHistory() { try { return JSON.parse(localStorage.getItem(HIST_KEY) || '[]'); } catch { return []; } }
function saveHistory(q) {
  const h = [q, ...getHistory().filter(x => x !== q)].slice(0, 6);
  localStorage.setItem(HIST_KEY, JSON.stringify(h));
}
function renderChips() {
  const hist = getHistory();
  const area = $('chips-area');
  let html = '';
  if (hist.length) {
    html += `<div class="chips-label">最近查詢</div><div class="chips">` +
      hist.map(q => `<span class="chip history" onclick="quickSearch('${q.replace(/'/g,"\\'")}')">🕐 ${q}</span>`).join('') +
      `</div>`;
  }
  html += `<div class="chips-label">熱門鞋款</div><div class="chips">` +
    QUICK.map(q => `<span class="chip" onclick="quickSearch('${q.replace(/'/g,"\\'")}')"> ${q}</span>`).join('') +
    `</div>`;
  area.innerHTML = html;
}

// ── 分頁切換 ──────────────────────────────────────────────
function switchTab(tab, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  $('panel-' + tab).classList.add('active');
  if (tab === 'trending') loadTrending();
}

// ── 查價 ──────────────────────────────────────────────────
function quickSearch(q) {
  $('search-input').value = q;
  doSearch();
}

let _lastQuery = '';

async function doSearch() {
  const q = $('search-input').value.trim();
  if (!q) return;
  _lastQuery = q;
  hideSuggest();

  $('search-error').classList.remove('show');
  $('search-result').classList.remove('show');
  $('search-loading').classList.add('show');

  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), 60000);
  try {
    const res = await fetch('/api/search?q=' + encodeURIComponent(q), { signal: ctrl.signal });
    clearTimeout(timer);
    const data = await res.json();
    $('search-loading').classList.remove('show');

    if (data.error) {
      $('search-error').textContent = data.error;
      $('search-error').classList.add('show');
      return;
    }
    saveHistory(q);
    renderChips();
    renderResult(data);
  } catch (e) {
    clearTimeout(timer);
    $('search-loading').classList.remove('show');
    $('search-error').textContent = e.name === 'AbortError' ? '查詢逾時（60 秒），請再試一次' : '查詢失敗，請稍後再試';
    $('search-error').classList.add('show');
  }
}

function renderResult(data) {
  $('result-name').textContent = data.name;
  $('result-sku').textContent  = data.sku ? 'SKU: ' + data.sku : '';
  $('collab-badge').style.display = data.is_collab ? '' : 'none';
  $('cached-tag').style.display   = data.cached ? '' : 'none';
  $('query-time').textContent = '查詢於 ' + new Date().toLocaleTimeString('zh-TW', {hour:'2-digit',minute:'2-digit'});

  // 鞋款圖片
  const wrap = $('result-img-wrap');
  if (data.image_url) {
    wrap.innerHTML = `<img class="result-img" src="${data.image_url}" alt="${data.name}"
      onerror="this.parentNode.innerHTML='<div class=result-img-placeholder>👟</div>'">`;
  } else {
    wrap.innerHTML = `<div class="result-img-placeholder">👟</div>`;
  }

  // 套利卡
  const arb = data.arbitrage;
  if (arb && arb.profit > 0) {
    $('arb-card').style.display = '';
    $('arb-buy').textContent    = fmt(arb.buy_at);
    $('arb-sell').textContent   = fmt(arb.sell_at);
    $('arb-profit').textContent = '+' + fmt(arb.profit);
    $('arb-pct').textContent    = '+' + arb.margin_pct + '%';
  } else {
    $('arb-card').style.display = 'none';
  }

  // 平台列表（右欄緊湊版）
  const list = $('platforms-list');
  const card = $('platforms-card');
  list.innerHTML = '';
  card.classList.remove('show-all');
  let hiddenCount = 0;

  for (const p of data.platforms) {
    const hasPrice = p.price != null;
    const icon     = ICONS[p.platform] || '💻';
    const isOff    = p.is_official;
    const isNoData = !hasPrice && !p.url;

    const row = document.createElement(p.url ? 'a' : 'div');
    row.className = 'platform-row-r' + (isNoData ? ' no-data-row' : '');
    if (isNoData) hiddenCount++;
    if (p.url) { row.href = p.url; row.target = '_blank'; row.rel = 'noopener'; }

    let priceHtml;
    if (hasPrice) {
      const dot = isOff ? '<span class="official-dot"></span>' : '';
      priceHtml = `<div class="p-price-r${isOff ? ' official' : ''}">${fmt(p.price)}${dot}</div>`;
      if (p.sample_count > 1) {
        priceHtml += `<div class="p-range-r">${Math.round(p.price_min).toLocaleString()}~${Math.round(p.price_max).toLocaleString()}</div>`;
      }
    } else if (p.url) {
      priceHtml = `<div class="p-price-r no-data">查看 →</div>`;
    } else {
      priceHtml = `<div class="p-price-r no-url">—</div>`;
    }

    row.innerHTML = `
      <div class="p-icon-r">${icon}</div>
      <div class="p-name-r">${p.platform}</div>
      <div>${priceHtml}</div>`;
    list.appendChild(row);
  }

  const toggleRow = $('toggle-row');
  const toggleBtn = $('toggle-btn');
  if (hiddenCount > 0) {
    toggleRow.style.display = '';
    toggleBtn.textContent = `顯示 ${hiddenCount} 個查無資料平台 ▾`;
  } else {
    toggleRow.style.display = 'none';
  }

  $('search-result').classList.add('show');
}

let _showAll = false;
function toggleNoData() {
  _showAll = !_showAll;
  const card = $('platforms-card');
  const btn  = $('toggle-btn');
  if (_showAll) {
    card.classList.add('show-all');
    btn.textContent = '收起 ▴';
  } else {
    card.classList.remove('show-all');
    const hidden = card.querySelectorAll('.no-data-row').length;
    btn.textContent = `顯示 ${hidden} 個查無資料平台 ▾`;
  }
}

function shareResult() {
  const url = location.origin + location.pathname + '?q=' + encodeURIComponent(_lastQuery);
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => showToast('連結已複製 ✓'));
  } else {
    const el = document.createElement('input');
    el.value = url;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    showToast('連結已複製 ✓');
  }
  history.replaceState(null, '', '?q=' + encodeURIComponent(_lastQuery));
}

function showToast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── 利潤試算 ──────────────────────────────────────────────
function showProfitError(msg) {
  $('profit-error').textContent = msg;
  $('profit-error').classList.add('show');
}

async function calcProfit() {
  $('profit-error').classList.remove('show');
  const cost = parseFloat($('p-cost').value);
  if (!cost || cost <= 0) { showProfitError('請輸入有效的進貨成本'); return; }

  const currency   = $('p-currency').value;
  const shipping   = parseFloat($('p-shipping').value) || 0;
  const commission = parseInt($('sl-commission').value) / 100;
  const margin     = parseInt($('sl-margin').value) / 100;

  try {
    const params = new URLSearchParams({ cost, currency, shipping, commission, margin });
    const res  = await fetch('/api/profit?' + params);
    const data = await res.json();

    $('pr-price').textContent      = fmt(data.suggested_price);
    $('pr-sub').textContent        = `毛利 ${fmt(data.margin)}（${(margin*100).toFixed(0)}%）`;
    $('br-cost').textContent       = fmt(data.cost_twd);
    $('br-shipping').textContent   = fmt(data.shipping);
    $('br-total').textContent      = fmt(data.total_cost);
    $('br-commission').textContent = fmt(data.commission);
    $('br-margin').textContent     = fmt(data.margin);

    $('profit-result').classList.add('show');
  } catch (e) {
    showProfitError('計算失敗，請稍後再試');
  }
}

// ── 啟動 ─────────────────────────────────────────────────
renderChips();
(function initFromURL() {
  const q = new URLSearchParams(location.search).get('q');
  if (q) { $('search-input').value = q; doSearch(); }
})();

let _trendLoaded = false;

async function loadTrending() {
  if (_trendLoaded) return;
  try {
    const res  = await fetch('/api/trending');
    const data = await res.json();
    const list = $('trending-list');

    if (!data.items || data.items.length === 0) {
      list.innerHTML = `<div class="empty-state">
        <div class="icon">📭</div>
        <p>尚無熱銷資料<br>請先執行 <code>python daily_trending.py</code><br>並設定 Supabase 環境變數</p>
      </div>`;
      return;
    }

    $('trending-meta').textContent = `共 ${data.items.length} 筆`;
    list.innerHTML = '';

    // 依 source 分組後依 rank 排列
    const sorted = [...data.items].sort((a, b) => {
      if (a.source !== b.source) return a.source < b.source ? -1 : 1;
      return (a.rank || 99) - (b.rank || 99);
    });

    sorted.forEach(item => {
      const rank = item.rank || '?';
      const rankN = parseInt(rank);
      const rankClass = rankN === 1 ? 'rank-1' : rankN === 2 ? 'rank-2' : rankN === 3 ? 'rank-3' : 'rank-other';
      const srcTag = item.source === 'SNKRDUNK'
        ? '<span class="source-tag source-snkrdunk">SNKRDUNK</span>'
        : '<span class="source-tag source-area02">Area02</span>';

      const el = document.createElement('div');
      el.className = 'trend-item';
      el.onclick = () => {
        const q = item.sku || item.name;
        if (!q) return;
        switchTab('search', document.querySelectorAll('.tab')[0]);
        $('search-input').value = q;
        doSearch();
      };
      el.innerHTML = `
        <div class="rank-badge ${rankClass}">${rank}</div>
        <div class="trend-info">
          <div class="trend-name">${item.name || item.sku}</div>
          <div class="trend-source">${srcTag}${item.sku ? item.sku : ''}</div>
        </div>
        ${item.price ? `<div class="trend-price">${fmt(item.price)}</div>` : ''}`;
      list.appendChild(el);
    });

    _trendLoaded = true;
  } catch (e) {
    $('trending-list').innerHTML = `<div class="empty-state"><p>載入失敗，請稍後再試</p></div>`;
  }
}
</script>
